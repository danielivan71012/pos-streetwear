$kind: http-request
name: POST Crear Vendedor
url: '{{baseUrl}}/vendedores'
method: POST
body:
  type: json
  content: |-
    {
      "Nombre_Completo": "Test Vendedor",
      "Rol": "Vendedor",
      "Email_Contacto": "{{email}}"
    }
order: 2000
scripts:
  - type: beforeRequest
    code: |-
      pm.variables.set("email", "juan" + Date.now() + "@mail.com");
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test("Status 201", function () {
        pm.response.to.have.status(201);
      });

      pm.test("Body has ok and data", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("ok", true);
        pm.expect(json).to.have.property("data");
      });

      pm.test("Save vendedorId", function () {
        const json = pm.response.json();
        pm.expect(json.data).to.have.property("ID_Usuario");
        pm.collectionVariables.set("vendedorId", String(json.data.ID_Usuario));
      });
    language: text/javascript
