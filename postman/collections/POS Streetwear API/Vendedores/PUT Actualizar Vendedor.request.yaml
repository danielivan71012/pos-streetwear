$kind: http-request
name: PUT Actualizar Vendedor
url: '{{baseUrl}}/vendedores/{{vendedorId}}'
method: PUT
body:
  type: json
  content: |-
    {
      "Nombre_Completo": "Vendedor Actualizado",
      "Rol": "Administrador"
    }
order: 4000
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status 200", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Body has ok and data", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("ok", true);
        pm.expect(json).to.have.property("data");
      });

      pm.test("Name was updated", function () {
        const json = pm.response.json();
        pm.expect(json.data.Nombre_Completo).to.eql("Vendedor Actualizado");
      });
    language: text/javascript
