$kind: http-request
name: PUT Actualizar Producto
url: '{{baseUrl}}/productos/{{productoId}}'
method: PUT
body:
  type: json
  content: |-
    {
      "ID_Marca": 1,
      "ID_Categoria": 1,
      "Nombre_Modelo": "Sneaker Actualizado",
      "Precio_Venta": 1499.99
    }
order: 4000
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status 200", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Body has ok and data", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("ok", true);
        pm.expect(json).to.have.property("data");
      });

      pm.test("Name was updated", function () {
        const json = pm.response.json();
        pm.expect(json.data.Nombre_Modelo).to.eql("Sneaker Actualizado");
      });
    language: text/javascript
