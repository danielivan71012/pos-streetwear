$kind: http-request
name: GET Ruta Invalida 404
url: '{{baseUrl}}/no-existe'
method: GET
order: 11000
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status 404", function () {
        pm.response.to.have.status(404);
      });

      pm.test("Body devuelve error JSON", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("ok", false);
        pm.expect(json).to.have.property("error");
      });
    language: text/javascript
