$kind: http-request
name: 'POST Vendedor - Email Invalido'
url: '{{baseUrl}}/vendedores'
method: POST
order: 1000
body:
  type: json
  content: |-
    {
      "Nombre_Completo": "Test Vendedor",
      "Rol": "Vendedor",
      "Email_Contacto": "correo-sin-arroba"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status 400 - email inválido", function () {
        pm.response.to.have.status(400);
      });

      pm.test("Body has ok=false", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("ok", false);
      });

      pm.test("Error message mentions email", function () {
        const json = pm.response.json();
        const msg = JSON.stringify(json).toLowerCase();
        pm.expect(msg).to.include("email");
      });
    language: text/javascript
