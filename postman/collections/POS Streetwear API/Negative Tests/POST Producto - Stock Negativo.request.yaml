$kind: http-request
name: 'POST Producto - Stock Negativo'
url: '{{baseUrl}}/productos'
method: POST
order: 5000
body:
  type: json
  content: |-
    {
      "ID_Marca": 1,
      "ID_Categoria": 1,
      "Nombre_Modelo": "Sneaker Stock Neg",
      "Atributo_Talla_Medida": "42",
      "Precio_Venta": 999.99,
      "Stock_Disponible": -5
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status 400 - stock negativo", function () {
        pm.response.to.have.status(400);
      });

      pm.test("Body has ok=false", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("ok", false);
      });

      pm.test("Error message mentions stock", function () {
        const json = pm.response.json();
        const msg = JSON.stringify(json).toLowerCase();
        pm.expect(msg).to.include("stock");
      });
    language: text/javascript
